plugins {
    id 'com.github.johnrengelman.shadow' version '4.0.2'
    id 'java'
}

group = "io.github.sarhatabaot.farmassist"
version = '1.0.3'

sourceCompatibility = 1.8
targetCompatibility = 1.8

repositories {
    mavenCentral()
    jcenter()
    maven {
        name = 'spigotmc-repo'
        url = 'https://hub.spigotmc.org/nexus/content/groups/public/'
    }
    maven {
        name = 'sonatype'
        url = 'https://oss.sonatype.org/content/groups/public/'
    }
    maven {
        name = 'code-mc'
        url = 'https://repo.codemc.org/repository/maven-public'
    }
    maven { url = 'https://jitpack.io' }
}

dependencies {
    testCompile group: 'junit', name: 'junit', version: '4.12'
    compileOnly 'org.spigotmc:spigot-api:1.14-R0.1-SNAPSHOT'
    compile 'org.bstats:bstats-bukkit:1.5'
    compile 'com.github.sarhatabaot:CommandManager:0b54e72c83'
}


import org.apache.tools.ant.filters.ReplaceTokens

processResources {
    from(sourceSets.main.resources.srcDirs) {
        filter ReplaceTokens, tokens: [version: version]
    }
}

configurations.all {
    resolutionStrategy.cacheChangingModulesFor 0, 'seconds'
}

shadowJar {
    minimize()
    relocate('org.bstats', 'io.github.sarhatabaot.farmassist.bstats')
    relocate('com.github.sarhatabaot', 'io.github.sarhatabaot.farmassist.command.commandmanager')
}
